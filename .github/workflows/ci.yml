name: CI

# push 到 main 或 PR 时，验证前后端能否构建通过
on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'mobile/**'
      - 'server/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'admin/**'
      - 'mobile/**'
      - 'server/**'
      - '.github/workflows/ci.yml'

# 最小权限：CI 仅需读取代码，不依赖仓库级默认权限
permissions:
  contents: read

jobs:
  admin:
    name: 前端 admin 构建校验
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      # 与 admin/Dockerfile 保持一致：用 npm 容错安装（仓库 lock 与 package.json 存在漂移）
      # admin 仅有 pnpm-lock.yaml、无 package-lock.json，故不启用 npm 缓存（否则 setup-node 解析缓存路径失败）
      - name: 配置 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install --no-audit --no-fund
        env:
          HUSKY: 0 # CI 环境跳过 husky git hooks 安装

      # 与生产镜像构建方式一致：仅 vite build（vue-tsc 类型检查暂不作为门禁）
      - name: 构建
        run: npx vite build

  server:
    name: 后端 server 构建校验
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          # 固定 10：pnpm 11.6+ 要求 Node ≥22.13（依赖 node:sqlite），与本项目 Node 20 不兼容
          version: 10

      - name: 配置 Node 与 pnpm 缓存
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # Prisma Client 是构建期依赖，需先生成才能通过 nest build 的类型检查
      - name: 生成 Prisma Client
        run: pnpm prisma generate

      - name: 构建
        run: pnpm build

  mobile:
    name: 移动端 mobile 构建校验
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # mobile 暂无 lock 文件，用 npm install 容错安装（与 mobile/Dockerfile 一致）
      - name: 安装依赖
        run: npm install --no-audit --no-fund
        env:
          HUSKY: 0

      - name: 构建
        run: npx vite build
